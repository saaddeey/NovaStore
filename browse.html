<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Gaming Gear - NovaStore</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="nav-brand">
                <h2>⚡ NovaStore</h2>
            </div>
        </div>
        <div class="nav-center">
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="browse.html" class="nav-link active">Browse</a>
                <a href="library.html" class="nav-link">Library</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search products...">
                <button class="search-btn">🔍</button>
            </div>
            <button class="nav-btn" id="cartBtn">
                <span class="icon">🛒</span>
                <span class="count" id="cartCount">0</span>
            </button>
            <button class="nav-btn" id="wishlistBtn">
                <span class="icon">❤️</span>
                <span class="count" id="wishlistCount">0</span>
            </button>
            <button class="nav-btn" id="loginBtn">Login</button>
        </div>
        <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>
    </nav>

    <!-- Browse Section -->
    <section class="browse-section">
        <div class="container">
            <div class="browse-header">
                <h1 class="page-title">Browse Gaming Gear</h1>
                <div class="filter-controls">
                    <select id="categoryFilter">
                        <option value="all">All Gaming Gear</option>
                        <option value="Gaming Gear - Mouse">Gaming Gear - Mouse</option>
                        <option value="Gaming Gear - Keyboard">Gaming Gear - Keyboard</option>
                        <option value="Gaming Gear - Headsets">Gaming Gear - Headsets</option>
                        <option value="Gaming Gear - Accessories">Gaming Gear - Accessories</option>
                    </select>
                    <select id="sortFilter">
                        <option value="featured">Featured</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Rating: High to Low</option>
                    </select>
                </div>
            </div>
            <div class="products-grid" id="allProductsGrid">
                <!-- Products will be dynamically inserted here -->
            </div>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Shopping Cart</h3>
            <button class="close-btn" id="closeCartBtn">×</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be dynamically inserted here -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Checkout</button>
        </div>
    </div>

    <!-- Wishlist Modal -->
    <div class="wishlist-overlay" id="wishlistOverlay"></div>
    <div class="wishlist-modal" id="wishlistModal">
        <div class="wishlist-header">
            <h3>My Wishlist</h3>
            <button class="close-btn" id="closeWishlistBtn">×</button>
        </div>
        <div class="wishlist-items" id="wishlistItems">
            <!-- Wishlist items will be dynamically inserted here -->
        </div>
    </div>

    <!-- Login Modal -->
    <div class="login-overlay" id="loginOverlay"></div>
    <div class="login-modal" id="loginModal">
        <div class="login-header">
            <h3>Login to NovaStore</h3>
            <button class="close-btn" id="closeLoginBtn">×</button>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="loginUsername" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 NovaStore. Premium Gaming & Digital Books. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/app.js" defer></script>
</body>
</html>
